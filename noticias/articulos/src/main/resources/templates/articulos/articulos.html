<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Artículos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<nav class="navbar">
				<nav class="navbar">
				        <!-- Ahora es una etiqueta 'a' que apunta a index.html -->
				        <a href="https://anthonyzc05.github.io/noticia_digital/" class="navbar-brand">
				            <i class="fa-solid fa-layer-group"></i> NexusNews Hub
				        </a>
				    </nav>
			    <ul class="nav-menu">
					<li><a href="http://localhost:8083/comentarios">Comentarios</a></li>
			        <li><a href="http://localhost:8082/categorias">Categorias</a></li>
			        <li><a href="http://localhost:8084/usuarios" >Usuarios</a></li>
			        <li><a href="http://localhost:8081/articulos" class="active">Articulos</a></li>
					<li><a href="http://localhost:8086/reacciones"class="btn-nuevo">Reacciones</a></li>
					<li><a href="http://localhost:8085/notificaciones">Notificaciones</a></li>
					<li><a href="http://localhost:8087/lista">Articulos Favoritos</a></li>
			    </ul>
			</nav>
<div class="contenedor">
    <!-- 🔹 FORMULARIO -->
    <div class="card">
        <h1>Registrar Artículo</h1>

        <form th:action="@{/articulos/guardar}" th:object="${articulo}" method="post">

            <label>Título</label>
            <input type="text" th:field="*{titulo}" required>

            <label>Contenido</label>
            <textarea th:field="*{contenido}" required></textarea>

            <label>ID Categoría</label>
            <input type="text" th:field="*{categoriaId}" required>

            <label>ID Autor</label>
            <input type="text" th:field="*{autorId}" required>

            <label>Fecha</label>
            <input type="date" th:field="*{fecha}" required>

            <br><br>

            <button type="submit">Guardar</button>
            <button type="reset">Limpiar</button>
        </form>
    </div>

    <!-- 🔹 TABLA -->
    <div class="card">
        <h2>Lista de Artículos</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Contenido</th>
                    <th>Categoría</th>
                    <th>Autor</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="a : ${articulos}">
                    <td th:text="${a.id}"></td>
                    <td th:text="${a.titulo}"></td>
                    <td th:text="${a.contenido}"></td>
                    <td th:text="${a.categoriaId}"></td>
                    <td th:text="${a.autorId}"></td>
                    <td th:text="${a.fecha}"></td>
                    <td>
                        <a class="holaboton" th:href="@{'/articulos/eliminar/' + ${a.id}}"
                           onclick="return confirm('¿Eliminar artículo?')">
                            Eliminar
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(articulos)}">
                    <td colspan="7">No hay artículos registrados</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
