<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Comentarios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<nav class="navbar">
					<nav class="navbar">
					        <!-- Ahora es una etiqueta 'a' que apunta a index.html -->
					        <a href="https://anthonyzc05.github.io/noticia_digital/" class="navbar-brand">
					            <i class="fa-solid fa-layer-group"></i> NexusNews Hub
					        </a>
					    </nav>
				    <ul class="nav-menu">
						<li><a href="http://localhost:8083/comentarios" class="active">Comentarios</a></li>
				        <li><a href="http://localhost:8082/categorias" class="btn-nuevo">Categorias</a></li>
				        <li><a href="http://localhost:8084/usuarios" >Usuarios</a></li>
				        <li><a href="http://localhost:8081/articulos" >Articulos</a></li>
						<li><a href="http://localhost:8086/reacciones">Reacciones</a></li>
						<li><a href="http://localhost:8085/notificaciones">Notificaciones</a></li>
						<li><a href="http://localhost:8087/lista">Articulos Favoritos</a></li>
				    </ul>
				</nav>
<div class="contenedor">

    <!-- FORMULARIO -->
    <div class="card">
	
        <h1>Gestión de Comentarios</h1>

        <form th:action="@{/comentarios/guardar}" th:object="${comentario}" method="post">

            <label>Comentario</label>
            <textarea th:field="*{comentario}" required></textarea>

            <label>Usuario ID</label>
            <input type="text" th:field="*{usuarioId}" required>

            <label>Artículo ID</label>
            <input type="text" th:field="*{articuloId}" required>

            <label>Fecha</label>
            <input type="date" th:field="*{fecha}" required>

            <br><br>

            <button type="submit">Guardar</button>
            <button type="reset">Limpiar</button>
        </form>
    </div>

    <!-- TABLA -->
    <div class="card">
        <h2>Lista de Comentarios</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Comentario</th>
                    <th>Usuario</th>
                    <th>Artículo</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="c : ${comentarios}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.comentario}"></td>
                    <td th:text="${c.usuarioId}"></td>
                    <td th:text="${c.articuloId}"></td>
                    <td th:text="${c.fecha}"></td>
                    <td>
                        <a th:href="@{'/comentarios/eliminar/' + ${c.id}}"
                           onclick="return confirm('¿Eliminar?')">
                            Eliminar
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(comentarios)}">
                    <td colspan="6">No hay comentarios</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
