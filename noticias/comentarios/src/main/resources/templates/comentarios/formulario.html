<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Comentarios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="contenedor">

    <!-- FORMULARIO -->
    <div class="card">
        <h1>Gestión de Comentarios</h1>

        <form th:action="@{/comentarios/guardar}" th:object="${comentario}" method="post">

            <label>Comentario</label>
            <textarea th:field="*{comentario}" required></textarea>

            <label>Usuario ID</label>
            <input type="text" th:field="*{usuarioId}" required>

            <label>Artículo ID</label>
            <input type="text" th:field="*{articuloId}" required>

            <label>Fecha</label>
            <input type="date" th:field="*{fecha}" required>

            <br><br>

            <button type="submit">Guardar</button>
            <button type="reset">Limpiar</button>
        </form>
    </div>

    <!-- TABLA -->
    <div class="card">
        <h2>Lista de Comentarios</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Comentario</th>
                    <th>Usuario</th>
                    <th>Artículo</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="c : ${comentarios}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.comentario}"></td>
                    <td th:text="${c.usuarioId}"></td>
                    <td th:text="${c.articuloId}"></td>
                    <td th:text="${c.fecha}"></td>
                    <td>
                        <a th:href="@{'/comentarios/eliminar/' + ${c.id}}"
                           onclick="return confirm('¿Eliminar?')">
                            Eliminar
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(comentarios)}">
                    <td colspan="6">No hay comentarios</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
