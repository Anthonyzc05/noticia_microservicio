<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Comentarios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="contenedor">
        <div class="card">
            <h1>Gestión de Comentarios</h1>
            <p class="subtitulo">Microservicio de comentarios de la plataforma de noticias</p>

            <div th:if="${mensaje}" class="mensaje">
                <p th:text="${mensaje}"></p>
            </div>

            <form th:action="@{/comentarios/guardar}" th:object="${comentario}" method="post">
                
                <div class="form-group">
                    <label for="comentario">Comentario</label>
                    <textarea id="comentario" th:field="*{comentario}" rows="4" placeholder="Ingrese el comentario"></textarea>
                </div>

                <div class="form-group">
                    <label for="usuarioId">ID del Usuario</label>
                    <input type="number" id="usuarioId" th:field="*{usuarioId}" placeholder="Ingrese el ID del usuario">
                </div>

                <div class="form-group">
                    <label for="articuloId">ID del Artículo</label>
                    <input type="number" id="articuloId" th:field="*{articuloId}" placeholder="Ingrese el ID del artículo">
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" th:field="*{fecha}">
                </div>

                <div class="botones">
                    <button type="submit" class="btn guardar">Guardar</button>
                    <button type="reset" class="btn limpiar">Limpiar</button>
                </div>
            </form>
        </div>

        <div class="card tabla-card">
            <h2>Lista de Comentarios</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Comentario</th>
                        <th>Usuario</th>
                        <th>Artículo</th>
                        <th>Fecha</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${listaComentarios}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.comentario}"></td>
                        <td th:text="${c.usuarioId}"></td>
                        <td th:text="${c.articuloId}"></td>
                        <td th:text="${c.fecha}"></td>
                        <td>
                            <a th:href="@{/comentarios/eliminar/{id}(id=${c.id})}" class="btn eliminar"
                               onclick="return confirm('¿Deseas eliminar este comentario?')">
                                Eliminar
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(listaComentarios)}">
                        <td colspan="6">No hay comentarios registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
