server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # ==========================
        # API JSON
        # ==========================

        - id: articulos-service
          uri: http://articulos:8081
          predicates:
            - Path=/api/articulos/**

        - id: categorias-service
          uri: http://categorias:8082
          predicates:
            - Path=/api/categorias/**

        - id: comentarios-service
          uri: http://comentarios:8083
          predicates:
            - Path=/api/comentarios/**

        - id: usuarios-service
          uri: http://usuarios:8084
          predicates:
            - Path=/api/usuarios/**

        - id: notificaciones-service
          uri: http://notificaciones:8085
          predicates:
            - Path=/api/notificaciones/**

        - id: reacciones-service
          uri: http://reacciones:8086
          predicates:
            - Path=/api/reacciones/**

        - id: favoritos-service
          uri: http://favoritos:8087
          predicates:
            - Path=/api/favoritos/**

        # ==========================
        # VISTAS HTML - THYMELEAF
        # ==========================

        - id: articulos-vista
          uri: http://articulos:8081
          predicates:
            - Path=/articulos/**

        - id: categorias-vista
          uri: http://categorias:8082
          predicates:
            - Path=/categorias/**

        - id: comentarios-vista
          uri: http://comentarios:8083
          predicates:
            - Path=/comentarios/**

        - id: usuarios-vista
          uri: http://usuarios:8084
          predicates:
            - Path=/usuarios/**

        - id: notificaciones-vista
          uri: http://notificaciones:8085
          predicates:
            - Path=/notificaciones/**

        - id: reacciones-vista
          uri: http://reacciones:8086
          predicates:
            - Path=/reacciones/**

        - id: favoritos-vista
          uri: http://favoritos:8087
          predicates:
            - Path=/lista/**

management:
  endpoints:
    web:
      exposure:
        include: "*"

